<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Assinaturas - UNIFESP</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        unifesp: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            400: '#4ade80',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#1E5A3A', // Cor Principal Unifesp
                        },
                        gray: {
                            850: 'var(--bg-panel)',
                            900: 'var(--bg-main)',
                            950: 'var(--bg-body)',
                            800: 'var(--bg-element)',
                            700: 'var(--border-color)',
                            600: 'var(--text-muted)',
                            300: 'var(--text-dim)',
                        },
                        white: 'var(--text-primary)',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            /* Tema UNIFESP Moderno */
            --bg-body: #030712;
            --bg-main: #111827;
            --bg-panel: #1f2937;
            --bg-element: #374151;
            --border-color: #374151;
            --text-primary: #f9fafb;
            --text-muted: #9ca3af;
            --text-dim: #d1d5db;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-body); 
            color: var(--text-dim); 
            transition: background-color 0.3s, color 0.3s; 
        }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-body); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .signature-preview-area {
            background: white;
            border-radius: 8px;
            padding: 20px;
            min-height: 250px;
            overflow-x: auto;
        }

        .form-input-dark {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            color: var(--text-primary);
        }

        .form-input-dark:focus {
            outline: none;
            border-color: #1E5A3A;
            box-shadow: 0 0 0 2px rgba(30, 90, 58, 0.5);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .copy-button {
            background-color: #1E5A3A;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .copy-button:hover {
            background-color: #123924;
        }

        .json-action-button {
            height: 46px;
            padding: 0 14px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid;
            flex-shrink: 0;
            gap: 6px;
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden text-sm selection:bg-unifesp-900 selection:text-white">

    <!-- Cabeçalho Principal -->
    <header class="bg-gray-900 border-b border-gray-700 flex flex-col shadow-lg z-20 shrink-0 transition-colors duration-300">
        <div class="flex items-center justify-between px-4 py-3 border-gray-800 bg-gray-900">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded bg-gradient-to-br from-unifesp-600 to-unifesp-900 flex items-center justify-center text-white font-bold shadow-glow shrink-0">
                    <i class="fa-solid fa-signature"></i>
                </div>
                <div class="flex items-center gap-2 overflow-hidden">
                    <h1 class="text-xl font-bold tracking-tight text-white leading-none whitespace-nowrap">Gerador de Assinaturas</h1>
                    <span class="text-xl text-gray-700 font-light">|</span>
                    <span class="text-xl font-bold tracking-tight text-unifesp-400 leading-none truncate">UNIFESP</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Área de Conteúdo Principal -->
    <main class="flex-1 overflow-auto p-4 sm:p-6 fade-in">
        <div class="max-w-6xl mx-auto">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <!-- Formulário -->
                <div class="bg-gray-900 border border-gray-700 rounded-2xl shadow-xl p-6 sm:p-8">
                    <form id="signatureForm" onsubmit="event.preventDefault();">
                        <h2 class="text-xl font-bold text-unifesp-400 mb-6 flex items-center gap-2">
                            <i class="fa-solid fa-user-pen"></i> Seus Dados
                        </h2>

                        <div class="grid grid-cols-1 gap-4">
                            <div class="form-group">
                                <label class="form-label text-gray-300">Nome Completo <span class="text-red-500">*</span></label>
                                <input type="text" id="fullName" class="form-input-dark" placeholder="Ex: Alexsandro Cardoso Carvalho" value="Alexsandro Cardoso Carvalho" required>
                            </div>

                            <div class="form-group">
                                <label class="form-label text-gray-300">Cargo / Função <span class="text-red-500">*</span></label>
                                <input type="text" id="title" class="form-input-dark" placeholder="Ex: Diretor de Governança" value="Diretor de Governança e Planejamento" required>
                            </div>

                            <div class="form-group">
                                <label class="form-label text-gray-300">Departamento / Unidade <span class="text-red-500">*</span></label>
                                <input type="text" id="department" class="form-input-dark" value="Superintendência de Tecnologia da Informação - STI" required>
                            </div>

                            <div class="form-group">
                                <label class="form-label text-gray-300">E-mail <span class="text-red-500">*</span></label>
                                <input type="email" id="email" class="form-input-dark" value="alexsandro.carvalho@unifesp.br" required>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div class="form-group">
                                    <label class="form-label text-gray-300">Telefone</label>
                                    <input type="tel" id="phone" class="form-input-dark" value="(55) 11 33854100">
                                </div>
                                <div class="form-group">
                                    <label class="form-label text-gray-300">Ramal</label>
                                    <input type="text" id="ramal" class="form-input-dark" value="8023">
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="form-label text-gray-300">Celular</label>
                                <input type="tel" id="celular" class="form-input-dark" placeholder="(00) 00000-0000">
                            </div>

                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div class="form-group">
                                    <div class="flex items-center gap-2 mb-1">
                                        <label class="form-label text-gray-300 mb-0">Lattes (ID)</label>
                                        <a href="https://sua.unifesp.br/pt-br/curriculum_lattes" target="_blank" class="text-unifesp-400"><i class="fa-solid fa-circle-question"></i></a>
                                    </div>
                                    <input type="text" id="lattes" class="form-input-dark" placeholder="16 dígitos" value="6792408436784536">
                                </div>
                                <div class="form-group">
                                    <label class="form-label text-gray-300">ORCID (ID)</label>
                                    <input type="text" id="orcid" class="form-input-dark" placeholder="0000-0000-0000-0000">
                                </div>
                            </div>

                            <div class="form-group">
                                <div class="flex items-center gap-2 mb-1">
                                    <label class="form-label text-gray-300 mb-0">Link da Agenda (ID)</label>
                                    <a href="https://sua.unifesp.br/pt-br/gmail_bloco_de_horário" target="_blank" class="text-unifesp-400"><i class="fa-solid fa-circle-question"></i></a>
                                </div>
                                <div class="flex">
                                    <span class="inline-flex items-center px-3 rounded-l-md border border-r-0 border-gray-700 bg-gray-850 text-gray-400 text-xs">calendar.app.google/</span>
                                    <input type="text" id="scheduleLink" class="form-input-dark rounded-l-none" placeholder="Ex: 2cKG4..." value="2cKG4rUYkKPr62VL7">
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="form-label text-gray-300">Chave Pública PGP</label>
                                <input type="text" id="pgpKey" class="form-input-dark" value="958B AC14 C720 6D87 423A 10EA 69E4 CC11 2BD6 D620">
                            </div>

                            <div class="form-group">
                                <label class="form-label text-gray-300">Foto de Perfil (URL)</label>
                                <input type="url" id="photoUrl" class="form-input-dark" value="https://atendimento.unifesp.br/pics/usuarios/alexsandrocarvalho.jpg">
                            </div>

                            <div class="form-group">
                                <label class="form-label text-gray-300">Mensagem Personalizada</label>
                                <textarea id="customMessage" class="form-input-dark" rows="3">Para envio de mensagens seguras (criptografadas) pode ser utilizada a página: https://flowcrypt.com/me/alexsandrocarvalho</textarea>
                            </div>

                            <div class="form-group mt-2">
                                <details class="bg-gray-800 p-4 rounded-lg border border-gray-200">
                                    <summary class="font-bold text-unifesp-400 cursor-pointer">⚙️ Logotipo Setorial (Avançado)</summary>
                                    <div class="mt-4 space-y-3">
                                        <input type="url" id="sectorLogoUrl" class="form-input-dark text-xs" placeholder="URL da imagem do logotipo">
                                        <input type="url" id="sectorLogoLink" class="form-input-dark text-xs" placeholder="URL de destino ao clicar">
                                    </div>
                                </details>
                            </div>
                        </div>
                    </form>
                </div>

                <!-- Pré-visualização -->
                <div class="space-y-6">
                    <div class="bg-gray-900 border border-gray-700 rounded-2xl shadow-xl p-6 sm:p-8 sticky top-4">
                        <h2 class="text-xl font-bold text-unifesp-400 mb-6 flex items-center gap-2">
                            <i class="fa-solid fa-eye"></i> Pré-visualização
                        </h2>
                        
                        <div class="signature-preview-area mb-6">
                            <div id="signaturePreview" class="signature-content text-black"></div>
                        </div>
                        
                        <!-- Barra de Ações -->
                        <div class="flex items-center gap-2">
                            <button id="copyButton" class="copy-button">
                                <i class="fa-solid fa-copy"></i> Copiar para o Gmail
                            </button>
                            
                            <button id="exportButton" class="json-action-button bg-unifesp-800 hover:bg-unifesp-900 text-white border-unifesp-700" title="Exportar dados para arquivo JSON">
                                <i class="fa-solid fa-file-arrow-down"></i> JSON
                            </button>
                            
                            <button id="importButton" class="json-action-button bg-gray-800 hover:bg-gray-700 text-white border-gray-700" title="Importar dados de arquivo JSON">
                                <i class="fa-solid fa-file-arrow-up"></i> JSON
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Rodapé -->
    <footer class="bg-gray-950 border-t border-gray-700 py-3 px-6 text-xs text-gray-400 flex flex-col sm:flex-row justify-between items-center shrink-0 gap-4">
        <div class="flex items-center gap-4">
            <span><span class="font-mono">v1.2.1</span> | Modificado: <span id="lastModDate"></span></span>
            <span class="text-gray-700">|</span>
            <a href="termodeuso.html" class="hover:text-white transition-colors">Termo de uso</a>
            <span class="text-gray-700">|</span>
            <a href="politicadeprivacidade.html" class="hover:text-white transition-colors">Política de privacidade</a>
        </div>
        
        <div class="flex gap-3 items-center">
            <a href="https://github.com/alexsandroccarv" target="_blank" class="hover:text-white hover:underline transition-colors flex items-center gap-1">
                <i class="fa-brands fa-github text-unifesp-400"></i> Alexsandro Cardoso Carvalho
            </a>
            <span class="text-gray-600">|</span>
            <a href="https://github.com/unifesp/gerador-de-assinaturas" target="_blank" class="hover:text-white hover:underline transition-colors" title="Repositório Oficial do Projeto">UNIFESP</a>
            <span class="text-gray-600">|</span>
            <a href="https://www.gnu.org/licenses/agpl-3.0.html" target="_blank" class="hover:text-white transition-colors flex items-center gap-1" title="Licença AGPLv3 (Free Software Foundation)">
                <i class="fa-solid fa-scale-balanced text-unifesp-400"></i> AGPLv3
            </a>
        </div>
    </footer>

    <div id="hiddenSignatureContainer" style="position: absolute; left: -9999px; top: -9999px;"></div>

    <script>
        // Caminhos Relativos das Imagens
        const LOGO_BRASIL = 'images/governo.png';
        const LOGO_UNIFESP = 'images/unifesp.png';
        const LOGO_SUA_DEFAULT = 'images/suaunifesp.png';
        const ICON_ORCID = 'images/orcid.png';
        const ICON_LATTES = 'images/lattes.png';
        
        const PLACEHOLDER_AVATAR = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgdmlld0JveD0iMCAwIDEwMCAxMDAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CjxjaXJjbGUgY3g9IjUwIiBjeT0iNTAiIHI9IjUwIiBmaWxsPSIjMDA1MzA0Ii8+CjxjaXJjbGUgY3g9IjUwIiBjeT0iMzUiIHI9IjE1IiBmaWxsPSJ3aGl0ZSIvPgo8cGF0aCBkPSJNIDMwIDYwIFEgMzAgNzAgNDAgODAgTCA2MCA4MCBRIDcwIDcwIDcwIDYwIiBmaWxsPSJ3aGl0ZSIvPgo8L3N2Zz4=';

        const inputs = ['fullName', 'title', 'department', 'email', 'phone', 'ramal', 'celular', 'lattes', 'orcid', 'pgpKey', 'scheduleLink', 'photoUrl', 'customMessage', 'sectorLogoUrl', 'sectorLogoLink'].reduce((acc, id) => {
            const el = document.getElementById(id);
            if (el) acc[id] = el;
            return acc;
        }, {});

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text ? text.replace(/[&<>"']/g, m => map[m]) : '';
        }

        function linkify(text) {
            const urlPattern = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlPattern, url => `<a href="${url}" style="color: #1E5A3A; text-decoration: underline;">${url}</a>`);
        }

        function generateSignature() {
            const fullName = inputs.fullName?.value || 'Nome Completo';
            const title = inputs.title?.value || 'Cargo';
            const department = inputs.department?.value || 'Departamento';
            const email = inputs.email?.value || 'email@unifesp.br';
            const phone = inputs.phone?.value;
            const ramal = inputs.ramal?.value;
            const celular = inputs.celular?.value;
            const lattes = inputs.lattes?.value ? `https://lattes.cnpq.br/${inputs.lattes.value}` : '';
            const orcid = inputs.orcid?.value ? `https://orcid.org/${inputs.orcid.value}` : '';
            const scheduleLinkID = inputs.scheduleLink?.value;
            const pgpKey = inputs.pgpKey?.value;
            const photoUrl = inputs.photoUrl?.value || PLACEHOLDER_AVATAR;
            const customMessage = inputs.customMessage?.value;
            const sectorLogoUrl = inputs.sectorLogoUrl?.value;
            const sectorLogoLink = inputs.sectorLogoLink?.value || 'https://sua.unifesp.br';

            let contactHTML = `<div style="color: #333; font-size: 12px; margin: 2px 0;"><a href="mailto:${email}" style="color: #1E5A3A; text-decoration: none;">✉️ ${escapeHtml(email)}</a></div>`;

            let phoneLineParts = [];
            if (phone || ramal) {
                let pStr = '';
                if (phone) pStr += `<a href="tel:${phone.replace(/\D/g, '')}" style="color: #1E5A3A; text-decoration: none;">📞 ${escapeHtml(phone)}</a>`;
                if (phone && ramal) pStr += `<span style="color: #1E5A3A; font-weight: bold;"> | </span>`;
                if (ramal) pStr += `<span style="color: #1E5A3A;">Ramal: ${escapeHtml(ramal)}</span>`;
                phoneLineParts.push(pStr);
            }
            if (celular) {
                phoneLineParts.push(`<a href="tel:${celular.replace(/\D/g, '')}" style="color: #1E5A3A; text-decoration: none;">📱 ${escapeHtml(celular)}</a>`);
            }

            if (phoneLineParts.length > 0) {
                contactHTML += `<div style="color: #333; font-size: 12px; margin: 2px 0;">${phoneLineParts.join('<span style="color: #1E5A3A; font-weight: bold; margin: 0 8px;"> | </span>')}</div>`;
            }

            if (lattes || orcid) {
                let researchLinks = [];
                if (lattes) researchLinks.push(`<a href="${escapeHtml(lattes)}" style="color: #1E5A3A; text-decoration: none; display: inline-block; white-space: nowrap;"><img src="${ICON_LATTES}" alt="Lattes" style="width: 14px; height: 14px; margin-right: 4px; vertical-align: middle; border: none; display: inline-block;"><span style="vertical-align: middle;">Currículo Lattes</span></a>`);
                if (orcid) researchLinks.push(`<a href="${escapeHtml(orcid)}" style="color: #1E5A3A; text-decoration: none; display: inline-block; white-space: nowrap;"><img src="${ICON_ORCID}" alt="ORCID" style="width: 14px; height: 14px; margin-right: 4px; vertical-align: middle; border: none; display: inline-block;"><span style="vertical-align: middle;">ORCID</span></a>`);
                contactHTML += `<div style="color: #333; font-size: 12px; margin: 2px 0;">${researchLinks.join('<span style="color: #1E5A3A; font-weight: bold; margin: 0 8px;"> | </span>')}</div>`;
            }

            if (pgpKey) contactHTML += `<div style="color: #333; font-size: 11px; margin: 2px 0; display: flex; align-items: center; gap: 4px;"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1E5A3A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3L15.5 7.5z"/></svg><span style="color: #1E5A3A; font-weight: bold;">PGP:</span><span style="color: #666;">${linkify(escapeHtml(pgpKey))}</span></div>`;

            // Lógica restaurada para exibição do Agendamento
            let btns = '';
            if (scheduleLinkID) {
                btns += `<a href="https://calendar.app.google/${escapeHtml(scheduleLinkID)}" style="display: inline-block; background-color: #1E5A3A; color: white; padding: 8px 12px; border-radius: 4px; text-decoration: none; font-size: 12px; margin-right: 8px;">📅 Agendar horário</a>`;
            }
            btns += `<a href="https://atendimento.unifesp.br" style="display: inline-block; background-color: #1E5A3A; color: white; padding: 8px 12px; border-radius: 4px; text-decoration: none; font-size: 12px;">🎫 Abrir um chamado</a>`;

            let logosHTML = '';
            if (sectorLogoUrl) {
                logosHTML += `<td style="padding-right: 25px; vertical-align: bottom;"><a href="${escapeHtml(sectorLogoLink)}"><img src="${escapeHtml(sectorLogoUrl)}" height="40" style="height: 40px; border: 0; vertical-align: bottom;"></a></td>`;
            }
            logosHTML += `<td style="padding-right: 25px; vertical-align: bottom;"><a href="https://sua.unifesp.br"><img src="${LOGO_SUA_DEFAULT}" height="40" style="height: 40px; border: 0; vertical-align: bottom;"></a></td><td style="padding-right: 25px; vertical-align: bottom;"><a href="https://portal.unifesp.br/"><img src="${LOGO_UNIFESP}" height="40" style="height: 40px; border: 0; vertical-align: bottom;"></a></td><td style="vertical-align: bottom;"><a href="https://www.gov.br/pt-br"><img src="${LOGO_BRASIL}" height="40" style="height: 40px; border: 0; vertical-align: bottom;"></a></td>`;

            return `
<table style="border-collapse: collapse; font-family: Arial, sans-serif; font-size: 14px; color: #333;">
    <tr>
        <td style="padding: 0; vertical-align: middle; padding-right: 5px;">
            <img src="${photoUrl}" alt="${fullName}" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; display: block;">
        </td>
        <td style="width: 2px; background-color: #1E5A3A; padding: 0; vertical-align: middle;"></td>
        <td style="padding: 0; vertical-align: middle; padding-left: 10px;">
            <div style="font-weight: bold; color: #1E5A3A; font-size: 16px; margin-bottom: 3px;">${escapeHtml(fullName)}</div>
            <div style="font-weight: bold; color: #333; font-size: 13px; margin-bottom: 2px;">${escapeHtml(title)}</div>
            <div style="color: #666; font-size: 12px; margin-bottom: 1px;">${escapeHtml(department)}</div>
            <div style="color: #666; font-size: 12px; margin-bottom: 5px;">Universidade Federal de São Paulo</div>
            ${contactHTML}
            <div style="margin-top: 8px;">${btns}</div>
        </td>
    </tr>
</table>
<div style="border-top: 1px solid #ddd; margin: 10px 0; padding-top: 10px; width: 600px;">
    <table style="border-collapse: collapse;"><tr>${logosHTML}</tr></table>
</div>
${customMessage ? `<div style="border-top: 1px solid #ddd; margin-top: 10px; padding-top: 10px; color: #666; font-size: 11px; text-align: justify; line-height: 1.4; width: 600px;">${linkify(escapeHtml(customMessage)).replace(/\n/g, '<br>')}</div>` : ''}
`;
        }

        function updatePreview() { 
            const prev = document.getElementById('signaturePreview');
            if (prev) prev.innerHTML = generateSignature(); 
        }

        function exportSignatureJson() {
            const data = {}; Object.keys(inputs).forEach(key => { data[key] = inputs[key].value; });
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const fileName = inputs.email?.value.trim() || 'assinatura';
            a.href = url; a.download = `${fileName}.json`; a.click();
            URL.revokeObjectURL(url);
        }

        function importSignatureJson() {
            const f = document.createElement('input'); f.type = 'file'; f.accept = '.json';
            f.onchange = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const r = new FileReader();
                r.onload = (ev) => {
                    try {
                        const d = JSON.parse(ev.target.result);
                        Object.keys(d).forEach(k => { if (inputs[k]) inputs[k].value = d[k]; });
                        updatePreview();
                    } catch (err) { console.error('Erro:', err); }
                };
                r.readAsText(file);
            };
            f.click();
        }

        Object.values(inputs).forEach(input => {
            if (!input) return;
            input.addEventListener('input', () => {
                if (input.id === 'lattes') input.value = input.value.replace(/\D/g, '');
                if (input.id === 'orcid') input.value = input.value.replace(/^(https?:\/\/)?orcid\.org\//i, '');
                if (input.id === 'scheduleLink') input.value = input.value.replace(/^(https?:\/\/)?calendar\.app\.google\//i, '').replace(/[^a-zA-Z0-9_\-]/g, '');
                updatePreview();
            });
        });

        document.getElementById('copyButton').addEventListener('click', () => {
            const form = document.getElementById('signatureForm'); if (!form.reportValidity()) return;
            const container = document.getElementById('hiddenSignatureContainer');
            container.innerHTML = generateSignature();
            const range = document.createRange(); range.selectNodeContents(container);
            const selection = window.getSelection(); selection.removeAllRanges(); selection.addRange(range);
            document.execCommand('copy');
            const btn = document.getElementById('copyButton');
            btn.innerHTML = '<i class="fa-solid fa-check"></i> Copiado!';
            setTimeout(() => { 
                btn.innerHTML = '<i class="fa-solid fa-copy"></i> Copiar para o Gmail'; 
            }, 3000);
        });

        document.getElementById('exportButton').addEventListener('click', exportSignatureJson);
        document.getElementById('importButton').addEventListener('click', importSignatureJson);

        // Data de modificação no rodapé
        document.getElementById('lastModDate').innerText = new Date().toLocaleDateString();
        updatePreview();
    </script>
</body>
</html>
